name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0 or v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Resolve release version
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            raw="${{ inputs.version }}"
            version="${raw#v}"
            tag="v$version"
          else
            tag="$GITHUB_REF_NAME"
            version="${tag#v}"
          fi

          if [ -z "$version" ] || [ "$version" = "$tag" ]; then
            echo "::error::Release versions must use a v-prefixed tag or a semver workflow input."
            exit 1
          fi

          if [[ ! "$version" =~ ^[0-9]+[.][0-9]+[.][0-9]+(-[0-9A-Za-z.-]+)?([+][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release version must look like 0.1.0, optionally with a prerelease or build suffix."
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  agent:
    name: Build agent
    runs-on: ubuntu-24.04
    needs:
      - prepare
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun test tests/*.test.ts

      - name: Build Linux release binaries
        run: |
          bun run build:linux-x64
          bun run build:linux-arm64

      - name: Verify Linux release binaries
        run: |
          test -x dist/nemo-agent-linux-x64
          test -x dist/nemo-agent-linux-arm64
          file dist/nemo-agent-linux-x64 dist/nemo-agent-linux-arm64
          dist/nemo-agent-linux-x64 --help >/tmp/nemo-agent-help.txt
          test -s /tmp/nemo-agent-help.txt

      - name: Collect agent assets
        run: |
          mkdir -p dist/release
          cp dist/nemo-agent-linux-x64 dist/release/nemo-agent-linux-x64
          cp dist/nemo-agent-linux-arm64 dist/release/nemo-agent-linux-arm64

      - name: Upload agent assets
        uses: actions/upload-artifact@v4
        with:
          name: release-agent
          path: dist/release/*
          if-no-files-found: error

  macos:
    name: Build macOS app
    runs-on: macos-26
    needs:
      - prepare
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          sw_vers
          xcodebuild -version

      - name: Validate Apple release secrets
        shell: bash
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=0
          for name in \
            APPLE_APP_SPECIFIC_PASSWORD \
            APPLE_CERTIFICATE_P12_BASE64 \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_ID \
            APPLE_TEAM_ID
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing repository secret: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Configure Apple signing certificate
        shell: bash
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_P12_BASE64" ]; then
            echo "::warning::APPLE_CERTIFICATE_P12_BASE64 is not configured."
            exit 0
          fi

          if [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "::error::APPLE_CERTIFICATE_PASSWORD is required when a certificate is configured."
            exit 1
          fi

          keychain_password="${APPLE_KEYCHAIN_PASSWORD:-$GITHUB_RUN_ID}"
          certificate_path="$RUNNER_TEMP/nemo-signing-certificate.p12"
          keychain_path="$RUNNER_TEMP/nemo-signing.keychain-db"

          if ! printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$certificate_path" 2>/dev/null; then
            printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 -D > "$certificate_path"
          fi

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | sed 's/"//g')
          security default-keychain -d user -s "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

          identities="$(security find-identity -v -p codesigning "$keychain_path" || true)"
          printf '%s\n' "$identities"
          if ! printf '%s\n' "$identities" | grep -F "Developer ID Application:" | grep -F "($APPLE_TEAM_ID)" >/dev/null; then
            echo "::error::Imported certificate is not a Developer ID Application identity for APPLE_TEAM_ID."
            echo "::error::Export the Developer ID Application certificate with its private key as a .p12, base64-encode it, and save it as APPLE_CERTIFICATE_P12_BASE64."
            exit 1
          fi

      - name: Package signed and notarized app
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NEMO_BUILD_NUMBER: ${{ github.run_number }}
          NEMO_REQUIRE_SIGNING: "1"
          NEMO_VERSION: ${{ needs.prepare.outputs.version }}
        run: scripts/package-macos-app

      - name: Verify signed macOS package
        run: |
          test -f dist/release/Nemo.zip
          rm -rf "$RUNNER_TEMP/nemo-release"
          mkdir -p "$RUNNER_TEMP/nemo-release"
          ditto -x -k dist/release/Nemo.zip "$RUNNER_TEMP/nemo-release"
          test -d "$RUNNER_TEMP/nemo-release/Nemo.app"
          codesign --verify --deep --strict --verbose=2 "$RUNNER_TEMP/nemo-release/Nemo.app"
          xcrun stapler validate "$RUNNER_TEMP/nemo-release/Nemo.app"
          spctl --assess --type execute --verbose "$RUNNER_TEMP/nemo-release/Nemo.app"

      - name: Upload macOS asset
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: dist/release/Nemo.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-24.04
    needs:
      - prepare
      - agent
      - macos
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist/release

      - name: Create checksums
        run: |
          cd dist/release
          sha256sum Nemo.zip nemo-agent-linux-arm64 nemo-agent-linux-x64 > SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          notes_file="$(mktemp)"
          cat > "$notes_file" <<NOTES
          Nemo $VERSION

          Release assets:
          - Nemo.zip: signed and notarized macOS app for Homebrew cask installs.
          - nemo-agent-linux-x64: Linux x64 agent binary.
          - nemo-agent-linux-arm64: Linux arm64 agent binary.
          - SHA256SUMS: checksums for the release assets.
          NOTES

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/release/* --clobber
          else
            gh release create "$TAG" dist/release/* \
              --target "$GITHUB_SHA" \
              --title "Nemo $VERSION" \
              --notes-file "$notes_file"
          fi
