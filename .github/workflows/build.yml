name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent:
    name: Build Linux agent
    runs-on: ubuntu-24.04
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun test tests/*.test.ts

      - name: Build Linux binaries
        run: |
          bun run build:linux-x64
          bun run build:linux-arm64

      - name: Verify Linux binaries
        run: |
          test -x dist/nemo-agent-linux-x64
          test -x dist/nemo-agent-linux-arm64
          file dist/nemo-agent-linux-x64 dist/nemo-agent-linux-arm64
          dist/nemo-agent-linux-x64 --help >/tmp/nemo-agent-help.txt
          test -s /tmp/nemo-agent-help.txt

  macos:
    name: Build macOS app
    runs-on: macos-26
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          sw_vers
          xcodebuild -version

      - name: Package unsigned smoke build
        env:
          NEMO_BUILD_NUMBER: ${{ github.run_number }}
          NEMO_SKIP_NOTARIZATION: "1"
          NEMO_VERSION: "0.1.0"
        run: scripts/package-macos-app

      - name: Verify macOS package
        run: |
          test -f dist/release/Nemo.zip
          rm -rf "$RUNNER_TEMP/nemo-package"
          mkdir -p "$RUNNER_TEMP/nemo-package"
          ditto -x -k dist/release/Nemo.zip "$RUNNER_TEMP/nemo-package"
          test -d "$RUNNER_TEMP/nemo-package/Nemo.app"
